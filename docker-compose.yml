services:
    mysql-node1:
      image: mysql/mysql-server:8.0
      container_name: mysql-node1
      hostname: mysql-node1
      ports:
        - "3310:3306"
      environment:
        MYSQL_ROOT_PASSWORD: root1234
        MYSQL_ROOT_HOST: '%'
      volumes:
        - mysql-node1-data:/var/lib/mysql
        - ./docker/mysql/node1.cnf:/etc/my.cnf
        - ./docker/mysql/init-root.sql:/docker-entrypoint-initdb.d/init-root.sql
      networks:
        - cluster-net
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
        interval: 5s
        timeout: 3s
        retries: 20
        start_period: 30s

    mysql-node2:
      image: mysql/mysql-server:8.0
      container_name: mysql-node2
      hostname: mysql-node2
      ports:
        - "3320:3306"
      environment:
        MYSQL_ROOT_PASSWORD: root1234
        MYSQL_ROOT_HOST: '%'
      volumes:
        - mysql-node2-data:/var/lib/mysql
        - ./docker/mysql/node2.cnf:/etc/my.cnf
        - ./docker/mysql/init-root.sql:/docker-entrypoint-initdb.d/init-root.sql
      networks:
        - cluster-net
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
        interval: 5s
        timeout: 3s
        retries: 20
        start_period: 30s

    mysql-node3:
      image: mysql/mysql-server:8.0
      container_name: mysql-node3
      hostname: mysql-node3
      ports:
        - "3330:3306"
      environment:
        MYSQL_ROOT_PASSWORD: root1234
        MYSQL_ROOT_HOST: '%'
      volumes:
        - mysql-node3-data:/var/lib/mysql
        - ./docker/mysql/node3.cnf:/etc/my.cnf
        - ./docker/mysql/init-root.sql:/docker-entrypoint-initdb.d/init-root.sql
      networks:
        - cluster-net
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
        interval: 5s
        timeout: 3s
        retries: 20
        start_period: 30s

    mysql-router:
      image: mysql/mysql-router:8.0
      container_name: mysql-router
      ports:
        - "6446:6446"
        - "6447:6447"
      environment:
        MYSQL_HOST: mysql-node1
        MYSQL_PORT: "3306"
        MYSQL_USER: root
        MYSQL_PASSWORD: root1234
      depends_on:
        mysql-node1:
          condition: service_healthy
        mysql-node2:
          condition: service_healthy
        mysql-node3:
          condition: service_healthy
      networks:
        - cluster-net
      restart: on-failure

# --- 신규 추가 (Redis & WAS) ---
    redis-session:
      image: redis:alpine
      container_name: redis-session
      ports:
        - "6379:6379"
      networks:
        - cluster-net

    was-8080:
      image: tomcat:9-jdk17 # 실제 사용 환경에 맞춰 변경 (예: openjdk:11-jre)
      container_name: was-8080
      ports:
        - "8080:8080"
      volumes:
        - ./card-history-3tier-system.war:/usr/local/tomcat/webapps/ROOT.war
      environment:
        - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-router:6446/card_db
        - SPRING_REDIS_HOST=redis-session
        - SPRING_SESSION_STORE_TYPE=redis
      depends_on:
        - mysql-router
        - redis-session
      networks:
        - cluster-net

    was-8090:
      image: tomcat:9-jdk17
      container_name: was-8090
      ports:
        - "8090:8080" # 호스트 8090 -> 컨테이너 8080
      volumes:
        - ./card-history-3tier-system.war:/usr/local/tomcat/webapps/ROOT.war
      environment:
        - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-router:6446/card_db
        - SPRING_REDIS_HOST=redis-session
        - SPRING_SESSION_STORE_TYPE=redis
      depends_on:
        - mysql-router
        - redis-session
      networks:
        - cluster-net

    master-nginx:
      image: nginx:alpine
      container_name: master-nginx
      ports:
        - "80:80"
      volumes:
        - ./docker/nginx/master-nginx.conf:/etc/nginx/nginx.conf:ro
      networks:
        - cluster-net
      depends_on:
        - worker-nginx-1
        - worker-nginx-2

    worker-nginx-1:
      image: nginx:alpine
      container_name: worker-nginx-1
      expose:
        - "80"
      volumes:
        - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      networks:
        - cluster-net
      depends_on:
        - was-8080
        - was-8090

    worker-nginx-2:
      image: nginx:alpine
      container_name: worker-nginx-2
      expose:
        - "80"
      volumes:
        - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      networks:
        - cluster-net
      depends_on:
        - was-8080
        - was-8090

volumes:
  mysql-node1-data:
  mysql-node2-data:
  mysql-node3-data:

networks:
  cluster-net:
    driver: bridge